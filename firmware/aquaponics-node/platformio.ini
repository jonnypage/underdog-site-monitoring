; PlatformIO project for the Underdog aquaponics node firmware.
;
; Primary target: Wemos D1 Mini (ESP8266). The src/ tree is written so a future
; ESP32 environment (e.g. the Cheap Yellow Display) can share the same drivers
; and only a small amount of platform glue.
;
; Build a release artifact for the web installer with:
;   pio run -e wemos_d1_mini
; The merged single-file image lands at:
;   .pio/build/wemos_d1_mini/firmware.bin
; Use ../scripts/copy-binaries.sh to copy it into apps/web/public/firmware/.

[platformio]
default_envs = wemos_d1_mini
src_dir = src
include_dir = include

[env]
framework = arduino
monitor_speed = 115200
build_flags =
    -DUD_FW_VERSION=\"0.1.0\"
lib_deps =
    bblanchon/ArduinoJson@7.2.1
    paulstoffregen/OneWire@2.3.8
    milesburton/DallasTemperature@3.11.0
    arduino-libraries/NTPClient@3.2.1

[env:wemos_d1_mini]
platform = espressif8266@4.2.1
board = d1_mini
build_flags =
    ${env.build_flags}
    -DUD_BOARD=\"wemos_d1_mini\"
    -DUD_HAS_ANALOG=1
    -DUD_ANALOG_REF_MV=3300
    -DUD_ANALOG_RESOLUTION=1024
