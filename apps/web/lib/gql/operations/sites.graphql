query GetSites {
  getSites {
    id
    name
    location
    latitude
    longitude
    sensorReporting {
      key
      displayName
      unit
      physicalMin
      physicalMax
      rangeMin
      rangeMax
      thresholdMinOverride
      thresholdMaxOverride
      enabled
      currentValue
    }
    status
    lastUpdate
  }
}

query GetSite($id: ID!) {
  getSite(id: $id) {
    id
    name
    location
    latitude
    longitude
    sensorReporting {
      key
      displayName
      unit
      physicalMin
      physicalMax
      rangeMin
      rangeMax
      thresholdMinOverride
      thresholdMaxOverride
      enabled
      currentValue
    }
    status
    lastUpdate
  }
}

query GetSensorMeasurements($siteId: ID!, $sensorKey: String!, $range: TimeRange!) {
  getSensorMeasurements(siteId: $siteId, sensorKey: $sensorKey, range: $range) {
    sensor
    takenAt
    value
  }
}
